<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – DS Luxe</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="container">
    <h1>🛋️ DS Luxe Admin Panel</h1>

    <!-- Login -->
    <section id="login-section">
      <label>Enter admin password:</label>
      <input type="password" id="admin-pass" placeholder="Password" />
      <button id="login-btn">Login</button>
      <p id="login-msg" class="msg"></p>
    </section>

    <!-- Main Panel -->
    <section id="panel-section" class="hidden">


      <div class="panel-header">
        <h2>Manage Gallery</h2>
        <button id="save-btn" class="save-btn">💾 Save All Changes</button>
      </div>
      <p id="save-msg" class="msg"></p>

      <div class="control-group">
        <label>Select Service to Edit:</label>
        <select id="service-select"></select>
      </div>

      <div class="edit-area">
        <!-- Image Add via URL -->
        <div class="upload-box">
          <h3>📷 Add Photo URL</h3>
          <p style="font-size:12px; color:#9ca3af; margin-bottom: 12px; line-height: 1.4;">
            Vercel par direct upload kaam nahi karta. Apni image ko <a href="https://postimages.org/" target="_blank" style="color:#60a5fa; text-decoration: underline;">PostImages</a> ya <a href="https://imgur.com/" target="_blank" style="color:#60a5fa; text-decoration: underline;">Imgur</a> par upload karein, aur wahan se <b>Direct Link</b> (jo .jpg ya .png se end hota ho) copy karke yahan paste karein.
          </p>
          <input type="text" id="img-url" placeholder="Paste Direct Image Link (e.g., https://.../image.jpg)" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #4b5563; background: #374151; color: white; margin-bottom: 10px;">
          <button id="add-img-btn" class="action-btn">Add Image</button>
          <p id="upload-msg" class="msg"></p>
        </div>

        <!-- YouTube Video -->
        <div class="upload-box">
          <h3>🎬 Add YouTube Video</h3>
          <input type="text" id="yt-url" placeholder="Paste YouTube link...">
          <button id="add-yt-btn" class="action-btn">Add Video</button>
        </div>
      </div>

      <h3>Current Media</h3>
      <div id="media-grid" class="media-grid"></div>
    </section>
  </main>
  <script type="module" src="admin.js"></script>
</body>
</html>
